<svg xmlns="http://www.w3.org/2000/svg" width="960" height="580" viewBox="0 0 960 580" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="960" height="580" fill="#f7f9fc"/>
  <text x="50" y="48" font-size="27" font-weight="700" fill="#16243b">The Personal Security Roadmap</text>
  <text x="50" y="74" font-size="14" fill="#51637d">Tiered · Pillared · Monitored · Governed — a frontier-safety roadmap, pointed at one life.</text>

  <!-- BAND 1: PSL staircase -->
  <text x="50" y="112" font-size="13" font-weight="700" fill="#51637d">SEVERITY LEVELS  (response scales with the level — act on the threshold, not on adrenaline)</text>

  <!-- PSL-1 -->
  <rect x="50" y="200" width="270" height="70" rx="8" fill="#e6f3ea" stroke="#1c7a3a"/>
  <text x="68" y="226" font-size="16" font-weight="700" fill="#1c7a3a">PSL-1 · Baseline</text>
  <text x="68" y="247" font-size="12" fill="#2f5740">sev 1–2 · friction, ambiguous</text>
  <text x="68" y="263" font-size="12" font-weight="600" fill="#2f5740">→ log · maintain health</text>

  <!-- PSL-2 -->
  <rect x="340" y="160" width="270" height="110" rx="8" fill="#fbf0dd" stroke="#c98a1a"/>
  <text x="358" y="186" font-size="16" font-weight="700" fill="#a9710f">PSL-2 · Elevated</text>
  <text x="358" y="207" font-size="12" fill="#7a5410">sev 3 · clear, documentable harm</text>
  <text x="358" y="225" font-size="12" font-weight="600" fill="#7a5410">→ formal records</text>
  <text x="358" y="242" font-size="12" font-weight="600" fill="#7a5410">→ harden · put on notice</text>

  <!-- PSL-3 -->
  <rect x="630" y="110" width="280" height="160" rx="8" fill="#f7e3e0" stroke="#c0392b"/>
  <text x="648" y="136" font-size="16" font-weight="700" fill="#a4291d">PSL-3 · Critical</text>
  <text x="648" y="157" font-size="12" fill="#7a2018">sev 4–5 · safety / legal / criminal</text>
  <text x="648" y="178" font-size="12" font-weight="700" fill="#7a2018">→ CONTAINMENT NOW</text>
  <text x="648" y="196" font-size="12" fill="#7a2018">protective order · police</text>
  <text x="648" y="212" font-size="12" fill="#7a2018">lawyer · exit</text>
  <text x="648" y="234" font-size="11" fill="#a4291d">don't wait on the trend</text>

  <!-- escalation arrow -->
  <line x1="40" y1="270" x2="40" y2="120" stroke="#90a0b8" stroke-width="2"/>
  <path d="M36,128 L40,116 L44,128 Z" fill="#90a0b8"/>

  <!-- BAND 2: pillars -->
  <text x="50" y="316" font-size="13" font-weight="700" fill="#51637d">FOUR PILLARS  (so nothing falls through a gap)</text>
  <g font-size="12">
    <rect x="50" y="330" width="200" height="90" rx="8" fill="#ffffff" stroke="#cdd8e8"/>
    <text x="66" y="356" font-size="15" font-weight="700" fill="#16243b">Security</text>
    <text x="66" y="378" fill="#51637d">harden the attack</text>
    <text x="66" y="394" fill="#51637d">surface (locks, access,</text>
    <text x="66" y="410" fill="#51637d">devices, routine)</text>

    <rect x="266" y="330" width="200" height="90" rx="8" fill="#ffffff" stroke="#cdd8e8"/>
    <text x="282" y="356" font-size="15" font-weight="700" fill="#16243b">Safeguards</text>
    <text x="282" y="378" fill="#51637d">monitoring —</text>
    <text x="282" y="394" fill="#51637d">"eyes on everything":</text>
    <text x="282" y="410" fill="#51637d">log + Exposure Index</text>

    <rect x="482" y="330" width="200" height="90" rx="8" fill="#ffffff" stroke="#cdd8e8"/>
    <text x="498" y="356" font-size="15" font-weight="700" fill="#16243b">Alignment</text>
    <text x="498" y="378" fill="#51637d">stay positive-sum &amp;</text>
    <text x="498" y="394" fill="#51637d">calibrated; don't</text>
    <text x="498" y="410" fill="#51637d">become the mechanism</text>

    <rect x="698" y="330" width="212" height="90" rx="8" fill="#ffffff" stroke="#cdd8e8"/>
    <text x="714" y="356" font-size="15" font-weight="700" fill="#16243b">Policy</text>
    <text x="714" y="378" fill="#51637d">escalation ladder:</text>
    <text x="714" y="394" fill="#51637d">HR→EEOC · report→</text>
    <text x="714" y="410" fill="#51637d">protective order→lawyer</text>
  </g>

  <!-- BAND 3: governance -->
  <rect x="50" y="446" width="860" height="78" rx="8" fill="#16243b"/>
  <text x="68" y="474" font-size="14" font-weight="700" fill="#fff">Governance — you are the Responsible Scaling Officer</text>
  <text x="68" y="498" font-size="12.5" fill="#b9c6db">Weekly risk review (run score.py) · red-team yourself (fact vs inference) · threshold discipline (the level decides, not the mood)</text>
  <text x="68" y="515" font-size="11.5" fill="#8aa0c0">The calibration guard lives here — it's what keeps the roadmap from becoming paranoia.</text>

  <text x="50" y="556" font-size="12" fill="#90a0b8">Same architecture as a frontier-safety roadmap: layered, tiered, monitored, calibrated — beats vigilant-but-formless, for AI and for a person.</text>
</svg>
