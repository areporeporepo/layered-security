<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="920" height="600" fill="#fbfaf7"/>
  <text x="60" y="48" font-size="26" font-weight="700" fill="#1a1a1a">The Local-Knowledge Problem</text>
  <text x="60" y="74" font-size="15" fill="#555">Each layer sees only its own act — and calls it normal. No one sees the column on the right.</text>

  <!-- stakes axis -->
  <text x="30" y="300" font-size="12" font-weight="600" fill="#888" transform="rotate(-90 30 300)">STAKES  ↑  livelihood → standing → safety</text>

  <!-- arrowhead -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#b08968"/>
    </marker>
  </defs>

  <!-- Row 1 livelihood -->
  <g>
    <rect x="60" y="100" width="500" height="72" rx="8" fill="#ffffff" stroke="#e3ddd2"/>
    <rect x="60" y="100" width="10" height="72" rx="4" fill="#3b6db5"/>
    <text x="84" y="130" font-size="18" font-weight="700" fill="#1a1a1a">Workplace</text>
    <text x="84" y="154" font-size="14" fill="#555">a cold shoulder, a stalled promotion</text>
    <text x="500" y="126" font-size="11" font-weight="600" fill="#3b6db5" text-anchor="end">LIVELIHOOD</text>
    <line x1="560" y1="136" x2="628" y2="180" stroke="#b08968" stroke-width="1.6" marker-end="url(#arr)"/>
  </g>
  <!-- Row 2 social -->
  <g>
    <rect x="60" y="186" width="500" height="72" rx="8" fill="#ffffff" stroke="#e3ddd2"/>
    <rect x="60" y="186" width="10" height="72" rx="4" fill="#6a5acd"/>
    <text x="84" y="216" font-size="18" font-weight="700" fill="#1a1a1a">Social / online</text>
    <text x="84" y="240" font-size="14" fill="#555">a pile-on, an exclusion, a rumor</text>
    <text x="500" y="212" font-size="11" font-weight="600" fill="#6a5acd" text-anchor="end">STANDING</text>
    <line x1="560" y1="222" x2="628" y2="210" stroke="#b08968" stroke-width="1.6" marker-end="url(#arr)"/>
  </g>
  <!-- Row 3 institutional -->
  <g>
    <rect x="60" y="272" width="500" height="72" rx="8" fill="#ffffff" stroke="#e3ddd2"/>
    <rect x="60" y="272" width="10" height="72" rx="4" fill="#6a5acd"/>
    <text x="84" y="302" font-size="18" font-weight="700" fill="#1a1a1a">Institutional</text>
    <text x="84" y="326" font-size="14" fill="#555">a form lost, a complaint ignored</text>
    <text x="500" y="298" font-size="11" font-weight="600" fill="#6a5acd" text-anchor="end">STANDING</text>
    <line x1="560" y1="308" x2="628" y2="300" stroke="#b08968" stroke-width="1.6" marker-end="url(#arr)"/>
  </g>
  <!-- Row 4 neighborhood -->
  <g>
    <rect x="60" y="358" width="500" height="72" rx="8" fill="#ffffff" stroke="#e3ddd2"/>
    <rect x="60" y="358" width="10" height="72" rx="4" fill="#c0392b"/>
    <text x="84" y="388" font-size="18" font-weight="700" fill="#1a1a1a">Neighborhood</text>
    <text x="84" y="412" font-size="14" fill="#555">a “joke”, a stare, a small provocation</text>
    <text x="500" y="384" font-size="11" font-weight="600" fill="#c0392b" text-anchor="end">SAFETY</text>
    <line x1="560" y1="394" x2="628" y2="390" stroke="#b08968" stroke-width="1.6" marker-end="url(#arr)"/>
  </g>
  <!-- Row 5 home -->
  <g>
    <rect x="60" y="444" width="500" height="72" rx="8" fill="#ffffff" stroke="#e3ddd2"/>
    <rect x="60" y="444" width="10" height="72" rx="4" fill="#c0392b"/>
    <text x="84" y="474" font-size="18" font-weight="700" fill="#1a1a1a">Home / physical</text>
    <text x="84" y="498" font-size="14" fill="#555">entry, tampering, a safety threat</text>
    <text x="500" y="470" font-size="11" font-weight="600" fill="#c0392b" text-anchor="end">SAFETY</text>
    <line x1="560" y1="480" x2="628" y2="420" stroke="#b08968" stroke-width="1.6" marker-end="url(#arr)"/>
  </g>

  <!-- aggregate column -->
  <rect x="632" y="100" width="228" height="416" rx="10" fill="#1a1a1a"/>
  <text x="746" y="150" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">THE AGGREGATE</text>
  <text x="746" y="178" font-size="13" fill="#bbb" text-anchor="middle">the sum across all layers</text>
  <text x="746" y="300" font-size="15" font-weight="600" fill="#e8a23d" text-anchor="middle">no single actor</text>
  <text x="746" y="324" font-size="15" font-weight="600" fill="#e8a23d" text-anchor="middle">can see this column</text>
  <text x="746" y="470" font-size="12" fill="#bbb" text-anchor="middle">each act is “minor” alone —</text>
  <text x="746" y="490" font-size="12" fill="#bbb" text-anchor="middle">the harm lives in the total</text>

  <text x="60" y="556" font-size="13" fill="#777">The job of the incident log + Exposure Index is to reconstruct the black column — the one nobody is looking at.</text>
</svg>
